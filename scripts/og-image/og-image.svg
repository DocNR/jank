<?xml version="1.0" encoding="utf-8"?>
<!--
  Source SVG for public/og-image.png (1200x630, standard Open Graph aspect).

  Terminal-preset styling — mirrors the app's default "terminal" theme
  (html[data-theme-preset='terminal'].dark in src/index.css) so the share card
  reflects what visitors actually land on instead of the old modern-teal look:
    - Near-black background (#050505 — terminal dark chrome, META_THEME_COLOR)
    - Phosphor-green jank creature mark (#00FF41 — terminal primary, 135 100% 50%)
    - Monospace "JANK" wordmark (Geist Mono → Menlo fallback, resolved by fontconfig)
    - Tagline in calmer phosphor green (#75D78D — terminal foreground, 135 55% 65%)

  Render recipe lives at scripts/og-image/render.sh — re-run it after editing
  this file to regenerate public/og-image.png.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="1200"
     height="630"
     viewBox="0 0 1200 630">

  <!-- Background: terminal near-black -->
  <rect width="1200" height="630" fill="#050505"/>

  <!-- Brand mark, phosphor green. Nested <svg> with its own viewBox lets us reuse
       the creature path coordinates without recomputing translate/scale. -->
  <svg x="434.65" y="60" width="330.7" height="280" viewBox="230 166 332 281">
    <path fill="#00FF41" d="M554.5,269.9c-10.61-24.36-56.44-8.2-72.12-0.24c-15.68,7.96-45.35,29.91-54.27,20.02c-8.92-9.89,3.81-21.09,9.65-36.18c5.55-14.35,5.79-36.06,5.79-36.06c0-52.58-47.52-50.55-47.52-50.55s-47.52-2.04-47.52,50.55c0,0,0.24,21.71,5.79,36.06c5.83,15.09,18.57,26.29,9.65,36.18c-8.92,9.89-38.59-12.06-54.27-20.02s-61.51-24.12-72.12,0.24c-10.61,24.36-8.92,62.71,4.82,116.74c0,0,5.07,16.4,7.24,19.3c2.17,2.89,11.1,9.65,8.2-1.93c-2.89-11.58-16.76-101.55,10.01-107.34c0,0,2.53-0.42,4.7,1.09c0,0,7.6,2.41,7.24,15.92c-0.38,14.12-1.63,83.04,15.38,108.9c0,0,5.25,9.05,7.42-1.09c1.66-7.73-9.75-63.72,0.2-89.96c5.31-10.82,16.69-6.17,21-3.89l1.63,0.94c0.05,0.03,0.08,0.05,0.08,0.05l-0.01-0.01l0.02,0.01l-0.01,0c0,0,0.03,0.02,0.05,0.02l2.27,1.3c2.84,1.89,7.26,5.84,7.21,12.12c-1.51,33.64-2.45,95.9,10.98,99.32c0,0,4.7,4.34,3.98-13.39c-0.55-13.43-0.68-59.84,8.56-79.85l0,0.01c0,0,2.86-5.44,9.98-4.98l4.05,0.87l0.02,0.01c0,0,0.02,0,0.05,0.01l0.73,0.16c2.66,0.74,11.18,4.72,11.33,25.16c0.1,13.04,1.81,76.52,11.34,77.04c9.53-0.52,11.24-64,11.34-77.04c0.15-20.45,8.67-24.42,11.33-25.16l0.73-0.16c0.03,0,0.06-0.01,0.06-0.01l0.02-0.01l4.05-0.87c7.12-0.46,9.98,4.98,9.98,4.98l0-0.01c9.24,20.01,9.11,66.42,8.56,79.85c-0.72,17.73,3.98,13.39,3.98,13.39c13.43-3.42,12.49-65.68,10.98-99.32c-0.05-6.29,4.37-10.24,7.21-12.12l2.27-1.3c0.01-0.01,0.05-0.02,0.05-0.02l-0.01,0l0.02-0.01l-0.01,0.01c0,0,0.03-0.02,0.08-0.05l1.63-0.94c4.32-2.28,15.69-6.93,21,3.89c9.94,26.25-1.46,82.23,0.2,89.96c2.17,10.13,7.42,1.09,7.42,1.09c17.01-25.87,15.76-94.78,15.38-108.9c-0.36-13.51,7.24-15.92,7.24-15.92c2.17-1.51,4.7-1.09,4.7-1.09c26.77,5.79,12.9,95.76,10.01,107.34s6.03,4.82,8.2,1.93c2.17-2.89,7.24-19.3,7.24-19.3C563.43,332.61,565.12,294.26,554.5,269.9z"/>
  </svg>

  <!-- Wordmark "JANK". Monospace (Geist Mono → Menlo) to match the terminal
       preset's mono font. rsvg-convert resolves the chain via fontconfig. -->
  <text x="600" y="450"
        text-anchor="middle"
        font-family="Geist Mono, Menlo, DejaVu Sans Mono, monospace"
        font-weight="700"
        font-size="102"
        letter-spacing="10"
        fill="#00FF41">JANK</text>

  <!-- Tagline (BRAND.description from src/branding.ts) -->
  <text x="600" y="525"
        text-anchor="middle"
        font-family="Geist Mono, Menlo, DejaVu Sans Mono, monospace"
        font-weight="400"
        font-size="28"
        letter-spacing="0.9"
        fill="#75D78D">A TweetDeck-style multi-column deck for Nostr</text>
</svg>
