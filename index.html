<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>%BRAND_NAME%</title>
    <meta name="description" content="%BRAND_DESCRIPTION%" />
    <meta name="keywords" content="%BRAND_KEYWORDS%" />

    <meta name="apple-mobile-web-app-title" content="%BRAND_NAME%" />
    <link rel="icon" href="/favicon.ico?v=2" sizes="48x48" />
    <link rel="icon" href="/favicon.svg?v=2" sizes="any" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-dark.png?v=2" media="(prefers-color-scheme: dark)" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" id="theme-color-meta" content="#FFFFFF" />

    <meta property="og:url" content="%BRAND_HOMEPAGE%" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="%BRAND_NAME%" />
    <meta property="og:description" content="%BRAND_DESCRIPTION%" />
    <meta property="og:image" content="%BRAND_HOMEPAGE%/og-image.png?v=3" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="%BRAND_NAME% — %BRAND_DESCRIPTION%" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%BRAND_NAME%" />
    <meta name="twitter:description" content="%BRAND_DESCRIPTION%" />
    <meta name="twitter:image" content="%BRAND_HOMEPAGE%/og-image.png?v=3" />
  </head>
  <body>
    <noscript
      >You need to enable JavaScript to run this app. If you're looking for something on the nostr
      network, try replacing everything before the last slash in your URL bar with njump.me or
      nostr.at for a view-only nostr interface.</noscript
    >
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
